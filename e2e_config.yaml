# Chimera Configuration
# https://github.com/thebirdling/chimera
#
# All settings below show their defaults.
# Uncomment and modify as needed.

model:
  detector: isolation_forest
  n_estimators: 150
  contamination: auto
  scaler: standard
  ensemble_strategy: mean
  ensemble_detectors:
  - isolation_forest
  - lof
features:
  max_history_days: 30
  enable_peer_group: true
  enable_entropy: true
  enable_impossible_travel: true
rules:
  enabled: true
  load_builtins: true
  custom_rules_path: null
  rule_overrides: {}
scoring:
  auto_threshold: true
  contamination: 0.1
  threshold: null
  combine_ml_and_rules: true
  rule_weight: 0.3
output:
  formats:
  - json
  - csv
  - markdown
  output_dir: ./chimera_output
  prefix: chimera
  include_raw_events: false
watch:
  poll_interval_seconds: 30
  pattern: '*.csv'
  recursive: false
